name: Deploy Signal 5 to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: signal5-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Check out Signal 5
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Signal 5 site
        uses: actions/upload-pages-artifact@v4
        with:
          name: signal5-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: "."

      - name: Deploy Signal 5
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: signal5-pages-${{ github.run_id }}-${{ github.run_attempt }}
